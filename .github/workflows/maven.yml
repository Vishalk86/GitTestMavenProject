name: Maven CI

on:
  push:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build Project
      run: mvn clean test
	  
	- name: Upload Test Report
     	uses: actions/upload-artifact@v4
		with:
			name: cucumber-report
			path: target/
